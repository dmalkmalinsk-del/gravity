kind = "web"
previewPath = "/"
title = "Gravity"
version = "1.0.0"
id = "artifacts/gravity"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23258

[services.development]
run = "pnpm --filter @workspace/gravity run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gravity", "run", "build" ]
publicDir = "artifacts/gravity/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23258"
BASE_PATH = "/"
