<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="hole-gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050014" />
      <stop offset="70%" stop-color="#140a32" />
      <stop offset="100%" stop-color="#3b1d7d" />
    </radialGradient>
    <linearGradient id="ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer accretion disk -->
  <ellipse cx="256" cy="256" rx="200" ry="80" fill="none" stroke="url(#ring-gradient)" stroke-width="4" filter="url(#glow)" transform="rotate(-15 256 256)" />
  <ellipse cx="256" cy="256" rx="220" ry="60" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-opacity="0.6" transform="rotate(-15 256 256)" />
  
  <!-- Outer glow -->
  <circle cx="256" cy="256" r="100" fill="#7c3aed" opacity="0.3" filter="url(#glow)" />
  
  <!-- The event horizon -->
  <circle cx="256" cy="256" r="70" fill="url(#hole-gradient)" stroke="#a855f7" stroke-width="3" filter="url(#glow)" />
  
  <!-- Inner intense ring -->
  <circle cx="256" cy="256" r="75" fill="none" stroke="#d8b4fe" stroke-width="1.5" opacity="0.8" />
  
  <!-- Stylized G overlay -->
  <path d="M 280 200 A 45 45 0 0 0 256 190 A 66 66 0 1 0 322 256 H 260 V 226 H 290 A 36 36 0 1 1 256 220 A 36 36 0 0 1 280 230" fill="#f3e8ff" transform="translate(0, 10)" opacity="0.9" />
  
  <!-- Orbiting particles -->
  <circle cx="90" cy="200" r="4" fill="#c084fc" filter="url(#glow)" />
  <circle cx="420" cy="310" r="6" fill="#e9d5ff" filter="url(#glow)" />
  <circle cx="340" cy="160" r="3" fill="#a855f7" />
  <circle cx="150" cy="340" r="5" fill="#d8b4fe" filter="url(#glow)" />
</svg>